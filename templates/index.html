<!DOCTYPE html>
<html>
<head>
<title>Student Dropout Prediction</title>
</head>

<body>

<h2>Student Dropout Predictor</h2>

<form method="POST">

Age:
<input type="number" name="age"><br><br>

Study Hours per Day:
<input type="number" step="0.1" name="study_hours"><br><br>

Attendance Rate:
<input type="number" name="attendance"><br><br>

Stress Index:
<input type="number" name="stress"><br><br>

GPA:
<input type="number" step="0.1" name="gpa"><br><br>

<input type="submit" value="Predict">

</form>

<h3>{{ prediction }}</h3>

</body>
</html>
